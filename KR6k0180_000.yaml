body:
  text: 釋門章服儀序法身無相舍那御珍服暨乎逗三乘根應濁世之機如來自以丈六形著麁布僧伽梨學佛之徒靡不遵則焉洎澆代盛談心性儀相浸遺幣魔乘便大變聖制所謂冬服綾羅夏資紗縠華蕩奢靡無不為殊不知蠶衣之誡出於如來慈心之餘而為世福田緒脫劫奪難也負識高流莫不為之痛心疾首南山章服儀於是乎作也則使有志之士知有方而所自豈謂之小補哉然斯書雖存而後世講者鮮矣何居蓋聖制之興廢者時運之所繫也當像季際魔屬甚熾則知者亦隨衆所以雖廢亦興也至于鬪諍堅固之運則庸昏之徒含識而已於是乎救世大士直明佛性常住之旨為續慧命且後扶律之儀救其所急譬如見飢寒者先與之食而後與之衣所謂為護法故與共和光者也人多不見大士之意一飯之後將凍殺之是聖制之所以不能興也乃者省我比丘欲刻章服儀廣布于世而併應法記自書且請以余之言辨于編首余改容而曰比丘以不肖亦為釋氏之子乎欲不以人廢言乎呼余之言誰取焉然而余亦蓋有所聞有所聞者非余之言亦何辭為之敘寬文五年乙巳之冬草山桑門不可思議題
